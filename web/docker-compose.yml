version: '3.8'

services:
  # Thiết lập cho Backend
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app 
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - ./backend/.env

  # Thiết lập cho Frontend
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules 
    depends_on:
      - backend # Bắt buộc Backend phải chạy lên trước rồi Frontend mới được chạy